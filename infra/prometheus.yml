scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'user-db'
    static_configs:
      - targets: ['postgres-exporter-user:9187']

  - job_name: 'vehicle-db'
    static_configs:
      - targets: ['postgres-exporter-vehicle:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
