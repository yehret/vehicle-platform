services:
  user-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - '5433:5432'

  vehicle-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: vehicle_admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vehicle_db
    ports:
      - '5434:5432'

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_ENABLE_PROMETHEUS=true
    ports:
      - '5672:5672'
      - '15672:15672'
      - '15692:15692'

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

  prometheus:
    image: prom/prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana
    ports:
      - '3100:3000'

  redis-exporter:
    image: oliver006/redis_exporter
    environment:
      - REDIS_ADDR=redis:6379
    ports:
      - '9121:9121'

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://user_admin:password@user-db:5432/user_db?sslmode=disable
    ports:
      - '9187:9187'
