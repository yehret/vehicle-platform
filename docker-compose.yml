version: '3.8'

services:
  user-db:
    image: postgres:15-alpine
    container_name: vehicleservice-user-db
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: user_db
    volumes:
      - user_db_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user_admin -d user_db']
      interval: 5s
      timeout: 5s
      retries: 5

  vehicle-db:
    image: postgres:15-alpine
    container_name: vehicleservice-vehicle-db
    restart: always
    environment:
      POSTGRES_USER: vehicle_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: vehicle_db
    volumes:
      - vehicle_db_data:/var/lib/postgresql/data
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vehicle_admin -d vehicle_db']
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: vehicleservice-rabbitmq
    environment:
      - RABBITMQ_ENABLE_PROMETHEUS=true
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: vehicleservice-redis
    ports:
      - '6380:6379'

  user-service:
    build: ./services/user-service
    container_name: vehicleservice-user-api
    restart: always
    env_file:
      - .env
    environment:
      - USER_PORT=3000
      - DATABASE_URL=postgresql://user_admin:${POSTGRES_PASSWORD:-password}@user-db:5432/user_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_HOST=redis
    depends_on:
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  vehicle-service:
    build: ./services/vehicle-service
    container_name: vehicleservice-vehicle-api
    restart: always
    env_file:
      - .env
    environment:
      - VEHICLE_PORT=3000
      - DATABASE_URL=postgresql://vehicle_admin:${POSTGRES_PASSWORD:-password}@vehicle-db:5432/vehicle_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:5173}
    depends_on:
      vehicle-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: vehicleservice-web
    ports:
      - '80:80'
    depends_on:
      - user-service
      - vehicle-service

  prometheus:
    image: prom/prometheus
    container_name: vehicleservice-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana
    container_name: vehicleservice-grafana
    ports:
      - '3100:3000'
    volumes:
      - grafana_data:/var/lib/grafana

  redis-exporter:
    image: oliver006/redis_exporter
    environment:
      - REDIS_ADDR=redis:6379
    ports:
      - '9121:9121'

  postgres-exporter-user:
    image: prometheuscommunity/postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://user_admin:${POSTGRES_PASSWORD:-password}@user-db:5432/user_db?sslmode=disable
    ports:
      - '9187:9187'

  postgres-exporter-vehicle:
    image: prometheuscommunity/postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://vehicle_admin:${POSTGRES_PASSWORD:-password}@vehicle-db:5432/vehicle_db?sslmode=disable
    ports:
      - '9188:9187'

volumes:
  user_db_data:
  vehicle_db_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: vehicleservice-network
